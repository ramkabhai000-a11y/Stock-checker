name: Stock Checker

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_checker.py

      - name: Commit updated state
        run: |
          git config user.name "stock-checker-bot"
          git config user.email "actions@github.com"
          git add state.json stock_checker.log
          git diff --cached --quiet && exit 0
          git commit -m "Update stock state [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
          echo "All push attempts failed - non-fatal, will retry next run"
          exit 0
